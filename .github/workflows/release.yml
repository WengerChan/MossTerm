name: release

# MossTerm 发版流程
# 触发：
#   1. push tag v*            → 自动发版
#   2. workflow_dispatch      → 手动指定 tag 重跑（dr 验证 / 补发）
#
# 流程：
#   build (3 平台 matrix: linux/amd64 + darwin/universal + windows/amd64)
#     ↓
#   release (下载所有 artifact → 合并 dist/ → 生成 checksums → gh release create)
#
# 注意：
#   - 不发 pre-release（v* 默认 stable；alpha/beta 走 workflow_dispatch 时也不标 pre）
#   - 不复用 ci.yml 的 build：发版要锁死的 LDFLAGS + 干净 tree + 可重复
#   - artifact 命名以 platform 结尾（不带 os 主机名），方便 release 阶段下载

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag 名（vX.Y.Z）。push 触发时自动取 github.ref_name。"
        required: false
        default: ""
        type: string

# 同一 tag 不并发（dr 重跑时旧的 cancel）
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write   # 创建 GitHub Release 需要

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "24"
  WAILS_VERSION: "v2.12.0"
  PKG_PATH: github.com/mossterm/mossterm
  APP_NAME: mossterm

jobs:
  # ============================================================
  # Job 1: 跨平台 wails build（matrix = ci.yml 的精简版）
  # ============================================================
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            ext: ""
            archive: tar.gz
            bin: mossterm
          - os: macos-latest
            platform: darwin/universal
            ext: ""
            archive: tar.gz
            bin: mossterm
          - os: windows-latest
            platform: windows/amd64
            ext: ".exe"
            archive: zip
            bin: mossterm.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装 Linux 桌面依赖 (gtk3 + webkit)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config build-essential

      - name: 安装 Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          wails version

      - name: 前端依赖安装
        run: |
          cd frontend
          npm ci

      - name: 解析发布版本
        id: version
        run: |
          # 1) push 触发：ref_name 就是 tag（v0.5.3 等）
          # 2) dr 触发：用 inputs.tag_name（用户填）；空时回退到 "dev"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${{ github.ref_name }}"
          elif [[ -n "${{ inputs.tag_name }}" ]]; then
            TAG="${{ inputs.tag_name }}"
          else
            TAG="dev"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: wails build (${{ matrix.platform }})
        run: |
          mkdir -p dist
          LDFLAGS="-s -w \
            -X '${{ env.PKG_PATH }}/internal/app.Version=${{ steps.version.outputs.tag }}' \
            -X '${{ env.PKG_PATH }}/internal/app.Commit=${{ steps.version.outputs.commit }}' \
            -X '${{ env.PKG_PATH }}/internal/app.BuildDate=${{ steps.version.outputs.build_date }}'"
          wails build \
            -platform ${{ matrix.platform }} \
            -trimpath \
            -ldflags "$LDFLAGS" \
            -o "dist/${{ matrix.bin }}"

      - name: 打包归档
        run: |
          cd dist
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -czf "mossterm-${{ matrix.platform }}.tar.gz" "${{ matrix.bin }}"
          else
            powershell -NoProfile -Command "Compress-Archive -Path '${{ matrix.bin }}' -DestinationPath 'mossterm-${{ matrix.platform }}.zip'"
          fi
        shell: bash

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: mossterm-${{ matrix.platform }}
          path: |
            dist/${{ matrix.bin }}
            dist/mossterm-${{ matrix.platform }}.*
          if-no-files-found: error

  # ============================================================
  # Job 2: 创建 GitHub Release（带 checksums）
  # ============================================================
  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 解析发布版本
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${{ github.ref_name }}"
          elif [[ -n "${{ inputs.tag_name }}" ]]; then
            TAG="${{ inputs.tag_name }}"
          else
            TAG="dev"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: 下载所有 build artifact
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: 列出 dist 内容（调试）
        run: |
          echo "=== dist/ ==="
          ls -laR dist/

      - name: 生成 SHA-256 checksums
        working-directory: dist
        run: |
          sha256sum mossterm-* > checksums.txt
          cat checksums.txt

      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # 已存在则跳过（dr 重跑场景）
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG 已存在，跳过 create（dr 重跑不会覆盖）"
            gh release view "$TAG" --json url,name,publishedAt
            exit 0
          fi
          # 创建 release：上传 dist/ 下所有归档 + checksums.txt，自动生成 release notes
          gh release create "$TAG" ./dist/* \
            --title "$TAG" \
            --generate-notes \
            --target "${{ github.sha }}"
          echo "=== Release $TAG 已创建 ==="
          gh release view "$TAG" --json url,name,publishedAt
